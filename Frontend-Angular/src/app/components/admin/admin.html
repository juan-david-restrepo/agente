<div class="admin-layout">
  <button class="mobile-menu-btn" (click)="menuAbierto = !menuAbierto">
    ☰
  </button>

  <div class="sidebar-overlay" *ngIf="menuAbierto" (click)="menuAbierto = false"></div>

  <app-sidebar-admin [class.active]="menuAbierto"></app-sidebar-admin>

  <main class="main-content">
    <div class="header">
      <h2>Dashboard General</h2>
    </div>

    <div class="charts-grid">
      <div class="chart-card">
        <h4>Reportes Semanales</h4>
        <canvas id="lineChart"></canvas>
      </div>

      <div class="chart-card">
        <h4>Tipos de Infracción</h4>
        <canvas id="pieChart"></canvas>
      </div>
    </div>

    <div class="table-section">
      <h3>Infracciones Recientes</h3>
      <table class="data-table">
        <thead>
          <tr>
            <th>#</th>
            <th>Fecha</th>
            <th>Tipo</th>
            <th>Agente</th>
            <th>Estado</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td data-label="#">1</td>
            <td data-label="Fecha">03/07/2025</td>
            <td data-label="Tipo">Velocidad</td>
            <td data-label="Agente">Gómez</td>
            <td data-label="Estado"><span class="status pending">Pendiente</span></td>
          </tr>
          <tr>
            <td data-label="#">2</td>
            <td data-label="Fecha">03/07/2025</td>
            <td data-label="Tipo">Semáforo</td>
            <td data-label="Agente">López</td>
            <td data-label="Estado"><span class="status validated">Validado</span></td>
          </tr>
          <tr>
            <td data-label="#">3</td>
            <td data-label="Fecha">02/07/2025</td>
            <td data-label="Tipo">Parqueo indebido</td>
            <td data-label="Agente">Martínez</td>
            <td data-label="Estado"><span class="status pending">Pendiente</span></td>
          </tr>
        </tbody>
      </table>
    </div>
  </main>
</div>
